name: publish-detections
# Pull the external DaC repo, validate/build, and publish the bundle to Blob.
# Warm workers hot-reload it within refresh_interval_seconds (default 45s) - no
# redeploy. This is the "push -> live" pipeline in docs/architecture.md.
#
# GitHub Actions runners are never Azure resources, so this workflow always
# authenticates via Workload Identity Federation (the azure/login step below,
# OIDC only - no client secret). Treat this file as the LOCAL/TESTING path:
# useful for a personal fork or a quick validation loop against a real Azure
# instance. The production pipeline is .azure-pipelines/publish-detections.yml,
# which - because it runs in Azure DevOps - can use either Workload Identity
# Federation OR a plain Managed Identity if its agents run on Azure compute
# you control (see that file's identityMode parameter and infra/variables.tf's
# `publisher` variable for the underlying Terraform-level choice).
#
# Triggers:
#   - workflow_dispatch     : publish on demand (pick the env).
#   - repository_dispatch   : the DaC repo fires this on merge (see the snippet at
#                             the bottom of this file), so YOUR push to the DaC
#                             repo drives a publish here automatically.
on:
  workflow_dispatch:
    inputs:
      env:
        description: target environment
        type: choice
        options: [dev, prod]
        default: dev
  repository_dispatch:
    types: [dac-updated]

permissions:
  id-token: write      # OIDC federation to Azure (no stored secret)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      # MUST match infra/modules/function_app's runtime_version: `pyre deps` below
      # is only truthful if this interpreter matches the one the engine runs on.
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      # engine/requirements.txt (not just the CLI's own deps) so `pyre deps` checks
      # the bundle against the same package set the deployed engine has.
      - run: pip install -r engine/requirements.txt azure-storage-blob

      # Pull the DaC repo at the pinned ref. DAC_TOKEN scopes to a private repo;
      # omit for a public one. DAC_REF lets a repository_dispatch pin the exact sha.
      - name: pull DaC bundle
        env:
          DAC_TOKEN: ${{ secrets.DAC_TOKEN }}
          DAC_REF: ${{ github.event.client_payload.ref || vars.DAC_REF || '' }}
        run: |
          ./cli/pyre pull
          ./cli/pyre validate
          ./cli/pyre build

      # The gate for the hot-reload-vs-deploy split. Detections reload in ~45s;
      # engine/requirements.txt is only installed on DEPLOY. Without this, a DaC
      # push that adds an import publishes fine and the detection then silently
      # fails to load on every worker. Fail here instead - loudly, before publish.
      - name: check bundle imports resolve against engine/requirements.txt
        run: ./cli/pyre deps

      # OIDC login - the SP behind these must hold the detections-container role
      # (Terraform: publisher_principal_id).
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: publish bundle -> Blob
        env:
          BUNDLE_BLOB_ACCOUNT_URL: ${{ vars.BUNDLE_BLOB_ACCOUNT_URL }}  # e.g. https://pyrestor.blob.core.windows.net
        run: ./cli/pyre publish

# ---------------------------------------------------------------------------
# Put this in the DaC repo (.github/workflows/notify-pyre.yml) so a merge there
# publishes here automatically. PYRE_DISPATCH_TOKEN is a PAT with `repo` scope on
# THIS repo:
