# Pointer to the EXTERNAL Detections-as-Code repo (panther-analysis layout:
# paired .py + .yml per detection). No detection code lives in this repo.
#
# Push to the DaC repo -> `pyre publish` writes a bundle -> every warm worker
# hot-reloads it within refresh_interval_seconds, no redeploy. That covers
# detection CODE, not its imported PACKAGES: those come from
# engine/requirements.txt at DEPLOY time, so adding an import means editing
# requirements.txt + redeploying first. The publish pipeline gates on `pyre deps`
# to turn a missing dep into a red build instead of a silent load failure.

dac:
  repo: https://github.com/xtrajank/pyre-dac.git   # your DaC repo (or a private fork)
  ref: laptop-test                 # branch/tag/commit; pin a tag or sha for prod
  path: rules                      # subfolder holding the detections

  # Sibling dirs of shared helpers detections import by name (Panther's
  # AnalysisType: global). `pyre pull` copies them into the bundle and onto the
  # import path. Add any dir your detections import from.
  global_helpers: [global_helpers]

  # Auth to CLONE the repo, at publish time only (the engine pulls the built
  # bundle via Managed Identity, never clones). Read from this env var; unset for
  # a public repo.
  token_env: DAC_TOKEN

  include: ["**/*.yml", "**/*.yaml", "**/*.py"]
  exclude: ["**/*_tests.py", "**/*_test.py"]

# How a worker gets the bundle. Swap mode without touching engine code.
bundle:
  mode: local               # local | blob
  local_dir: ./.bundle      # local: worker reads this dir (where `pyre pull` lands)

  # blob: `pyre publish` writes a versioned bundle + pointer; the worker polls the
  # pointer and pulls via Managed Identity. account_url is injected per-env
  # (BUNDLE_BLOB_ACCOUNT_URL / Terraform), so it stays out of git.
  blob:
    account_url: ""                 # e.g. https://pyrestor.blob.core.windows.net
    container: detections           # separate from the Flex deploy-package container
    pointer_blob: current.json      # {"version": "<sha>", "path": "bundles/<sha>.zip"}

  # Upper bound on push-to-live on a warm worker: one cheap pointer read per
  # worker per interval, not per event. 30-60s is the sweet spot at volume.
  refresh_interval_seconds: 45
