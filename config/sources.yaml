# Declarative log sources. IaC reads this to size Event Hubs; the engine reads
# the configured log-type field (Terraform var log_type_field, default
# "dataset") off each event at runtime. Add a source = add an entry here.
# Give high-volume sources their own hub + more partitions to isolate scaling.

sources:
  - name: palo_traffic
    log_types: [SEC_Network_Palo_Alto_Traffic]
    hub: palo-traffic-in            # dedicated hub: isolates Palo's firehose
    partitions: 32                  # parallelism ceiling for this source
    retention_hours: 24

  - name: cloudflare
    log_types: [SEC_Web_Cloudflare]
    hub: cloudflare-in
    partitions: 16
    retention_hours: 24

  # Everything lower-volume can share one hub.
  - name: shared_default
    log_types: [SEC_XDR_AgentsInfo, SEC_Auth_Entra_Signin]
    hub: default-logs-in
    partitions: 8
    retention_hours: 24
