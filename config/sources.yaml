# Declarative log sources. IaC reads this to size Event Hubs; the engine reads
# p_log_type off each event at runtime. Add a source = add an entry here.
# Give high-volume sources their own hub + more partitions to isolate scaling.

sources:
  - name: palo_traffic
    log_types: [Palo.Traffic]
    hub: palo-in            # dedicated hub: isolates Palo's firehose
    partitions: 32          # parallelism ceiling for this source
    retention_hours: 24

  - name: cloudflare_http
    log_types: [Cloudflare.HttpRequest]
    hub: cloudflare-in
    partitions: 16
    retention_hours: 24

  # Everything lower-volume can share one hub.
  - name: shared_default
    log_types: [Okta.SystemLog, AWS.CloudTrail]
    hub: logs-in
    partitions: 8
    retention_hours: 24
