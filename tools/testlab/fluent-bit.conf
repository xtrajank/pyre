# Fluent Bit -> Azure Event Hubs (Kafka surface). ARM-friendly for a Pi.
# Replace <NS> and set the SASL password to the dev credential from Key Vault.
[SERVICE]
    flush        1
    log_level    info

[INPUT]
    Name         tail
    Path         /var/log/zeek/current/conn.log
    Tag          zeek.conn

# dataset = the field the engine routes on (Terraform log_type_field, default
# "dataset"). Must equal a LogType some detection declares, or nothing matches.
[FILTER]
    Name         modify
    Match        *
    Add          dataset ICO.Network

[OUTPUT]
    Name             kafka
    Match            *
    Brokers          <NS>.servicebus.windows.net:9093
    # A hub sources.yaml actually creates (the catch-all). A topic no hub
    # exists for is dropped by Event Hubs with no error.
    Topics           default-logs-in
    rdkafka.security.protocol  SASL_SSL
    rdkafka.sasl.mechanism     PLAIN
    rdkafka.sasl.username      $ConnectionString
    rdkafka.sasl.password      ${EVENTHUB_SASL_PASSWORD}
